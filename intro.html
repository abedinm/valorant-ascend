<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABEDIN // ASCEND — intro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@600;700;800&family=Chakra+Petch:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#ff4655; --teal:#2fe8c8; --ink:#05080a; --ink2:#0b1014;
    --dur:9s; /* total loop length */
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#000;overflow:hidden;font-family:"Chakra Petch",system-ui,sans-serif}
  /* 9:16 stage, centered — record THIS box */
  .stage{
    position:absolute; inset:0; margin:auto;
    width:min(100vw, 56.25vh); height:min(177.78vw, 100vh);
    background:radial-gradient(120% 80% at 50% 20%, #10181d 0%, var(--ink2) 45%, var(--ink) 100%);
    overflow:hidden; box-shadow:0 0 120px rgba(0,0,0,.8) inset;
  }
  /* tactical grid */
  .grid{
    position:absolute; inset:-20%;
    background-image:
      linear-gradient(rgba(47,232,200,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(47,232,200,.06) 1px, transparent 1px);
    background-size:44px 44px;
    mask-image:radial-gradient(70% 60% at 50% 45%, #000 40%, transparent 85%);
    animation:drift 12s linear infinite, fadeGrid var(--dur) ease-in-out infinite;
    transform:perspective(600px) rotateX(52deg) translateY(10%);
  }
  @keyframes drift{to{background-position:0 44px,44px 0}}
  @keyframes fadeGrid{0%{opacity:0}18%{opacity:.9}88%{opacity:.7}100%{opacity:0}}

  canvas#fog{position:absolute;inset:0;mix-blend-mode:screen;opacity:.9}

  /* red horizon scan */
  .scan{position:absolute;left:0;right:0;height:2px;top:0;
    background:linear-gradient(90deg,transparent,var(--red),transparent);
    box-shadow:0 0 24px 4px var(--red);
    animation:scan var(--dur) ease-in-out infinite;opacity:0}
  @keyframes scan{0%{top:-4%;opacity:0}8%{opacity:1}22%{top:104%;opacity:0}100%{opacity:0}}

  .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 8%}

  /* ABEDIN name assemble */
  .name{font-family:"Oxanium";font-weight:800;letter-spacing:.14em;
    font-size:clamp(34px,9vw,74px);color:#eaf6f4;position:relative;
    text-shadow:0 0 30px rgba(47,232,200,.35);
    animation:nameIn var(--dur) both}
  .name .u{position:absolute;left:50%;bottom:-14px;width:0;height:3px;
    transform:translateX(-50%);background:linear-gradient(90deg,var(--red),var(--teal));
    box-shadow:0 0 18px var(--teal);animation:under var(--dur) both}
  @keyframes nameIn{
    0%,6%{opacity:0;filter:blur(14px);letter-spacing:.5em;transform:translateY(8px)}
    12%{opacity:1;filter:blur(0);letter-spacing:.14em;transform:none}
    30%{opacity:1;transform:none}
    40%{opacity:0;transform:translateY(-18px) scale(.96);filter:blur(6px)}
    100%{opacity:0}
  }
  @keyframes under{0%,10%{width:0}16%{width:62%}34%{width:62%;opacity:1}40%{opacity:0}100%{opacity:0}}
  .role{font-family:"Chakra Petch";font-weight:600;margin-top:26px;
    font-size:clamp(11px,2.6vw,15px);letter-spacing:.4em;color:var(--teal);
    text-transform:uppercase;animation:roleIn var(--dur) both}
  @keyframes roleIn{0%,14%{opacity:0;letter-spacing:.9em}20%{opacity:.85;letter-spacing:.4em}34%{opacity:.85}40%{opacity:0}100%{opacity:0}}

  /* rank ladder climb */
  .ladder{position:absolute;left:9%;top:50%;transform:translateY(-50%);
    display:flex;flex-direction:column-reverse;gap:9px;opacity:0;animation:ladderShow var(--dur) both}
  @keyframes ladderShow{0%,40%{opacity:0}46%{opacity:1}66%{opacity:1}72%{opacity:0}100%{opacity:0}}
  .rung{font-family:"Oxanium";font-weight:700;font-size:clamp(9px,2.1vw,13px);
    letter-spacing:.12em;color:#5a6b6e;display:flex;align-items:center;gap:9px}
  .rung .dot{width:8px;height:8px;border-radius:2px;background:#33454a;transform:rotate(45deg)}
  .rung.lit{color:#eaf6f4;text-shadow:0 0 14px var(--teal)}
  .rung.lit .dot{background:var(--teal);box-shadow:0 0 14px var(--teal)}
  .rung.top{color:var(--red);text-shadow:0 0 18px var(--red)}
  .rung.top .dot{background:var(--red);box-shadow:0 0 18px var(--red)}
  .r1{animation:lite var(--dur) both;animation-delay:0s}
  .rung:nth-child(1){--t:.47}.rung:nth-child(2){--t:.49}.rung:nth-child(3){--t:.51}
  .rung:nth-child(4){--t:.53}.rung:nth-child(5){--t:.55}.rung:nth-child(6){--t:.57}
  .rung:nth-child(7){--t:.59}.rung:nth-child(8){--t:.61}.rung:nth-child(9){--t:.63}

  /* ASCEND slam */
  .ascend{font-family:"Oxanium";font-weight:800;letter-spacing:.06em;
    font-size:clamp(46px,13vw,104px);line-height:.9;
    background:linear-gradient(100deg,#fff 0%,var(--teal) 45%,var(--red) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 34px rgba(255,70,85,.35));
    animation:slam var(--dur) both}
  @keyframes slam{
    0%,66%{opacity:0;transform:scale(1.5);filter:blur(20px)}
    71%{opacity:1;transform:scale(1);filter:blur(0)}
    72%{transform:scale(1.03)}
    74%{transform:scale(1)}
    92%{opacity:1;transform:scale(1)}
    100%{opacity:0;transform:scale(1.02)}
  }
  .tag{font-family:"Chakra Petch";font-weight:700;margin-top:24px;
    font-size:clamp(11px,2.8vw,16px);letter-spacing:.42em;color:#cfe;text-transform:uppercase;
    animation:tagIn var(--dur) both}
  @keyframes tagIn{0%,72%{opacity:0;letter-spacing:.9em}77%{opacity:.9;letter-spacing:.42em}92%{opacity:.9}100%{opacity:0}}
  .tag b{color:var(--red)}
  .mark{position:absolute;bottom:6%;left:0;right:0;text-align:center;
    font-family:"Oxanium";font-weight:700;font-size:clamp(10px,2.3vw,13px);
    letter-spacing:.34em;color:#7f9296;text-transform:uppercase;
    animation:markIn var(--dur) both}
  @keyframes markIn{0%,74%{opacity:0}80%{opacity:.8}92%{opacity:.8}100%{opacity:0}}
  .mark span{color:var(--teal)}

  /* corner HUD ticks */
  .hud{position:absolute;inset:5%;pointer-events:none;opacity:0;animation:hud var(--dur) both}
  @keyframes hud{0%,4%{opacity:0}12%{opacity:.5}90%{opacity:.5}100%{opacity:0}}
  .hud::before,.hud::after{content:"";position:absolute;width:26px;height:26px;border:2px solid var(--teal);opacity:.5}
  .hud::before{top:0;left:0;border-right:0;border-bottom:0}
  .hud::after{bottom:0;right:0;border-left:0;border-top:0}
  .hud2::before,.hud2::after{content:"";position:absolute;width:26px;height:26px;border:2px solid var(--red);opacity:.5}
  .hud2::before{top:0;right:0;border-left:0;border-bottom:0}
  .hud2::after{bottom:0;left:0;border-right:0;border-top:0}

  .vig{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 50%,transparent 55%,rgba(0,0,0,.6) 100%)}
  .replay{position:absolute;bottom:10px;right:12px;z-index:9;font:600 11px "Chakra Petch";
    color:#8aa;background:rgba(0,0,0,.4);border:1px solid #2a3a3e;border-radius:6px;
    padding:6px 10px;cursor:pointer;letter-spacing:.1em}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;animation-iteration-count:1!important}}
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="grid"></div>
    <canvas id="fog"></canvas>
    <div class="scan"></div>
    <div class="hud"></div><div class="hud hud2"></div>

    <div class="ladder" id="ladder">
      <div class="rung"><span class="dot"></span>IRON</div>
      <div class="rung"><span class="dot"></span>BRONZE</div>
      <div class="rung"><span class="dot"></span>SILVER</div>
      <div class="rung"><span class="dot"></span>GOLD</div>
      <div class="rung"><span class="dot"></span>PLATINUM</div>
      <div class="rung"><span class="dot"></span>DIAMOND</div>
      <div class="rung"><span class="dot"></span>ASCENDANT</div>
      <div class="rung"><span class="dot"></span>IMMORTAL</div>
      <div class="rung"><span class="dot"></span>RADIANT</div>
    </div>

    <div class="center">
      <div class="name">ABEDIN<span class="u"></span></div>
      <div class="role">Entry &middot; Lock in &middot; No excuses</div>
    </div>
    <div class="center">
      <div class="ascend">ASCEND</div>
      <div class="tag">Climb &middot; <b>Lock in</b> &middot; Ascend</div>
    </div>
    <div class="mark">ABEDIN<span>BUILDS</span></div>
    <div class="vig"></div>
  </div>
  <button class="replay">Replay</button>

<script src="intro.js"></script>
</body>
</html>
