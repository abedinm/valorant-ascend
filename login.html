<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VALORANT ASCEND // Access</title>
  <style>
    :root { --bg:#0b1014; --panel:#121b24; --line:#25323d; --red:#ff4655; --teal:#2fe8c8; --text:#e7eef3; --dim:#93a4b1; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: radial-gradient(900px 500px at 80% -10%, rgba(255,70,85,.12), transparent 60%),
                  radial-gradient(800px 500px at 0% 110%, rgba(47,232,200,.09), transparent 55%), var(--bg);
      color: var(--text); font-family: system-ui, "Segoe UI", sans-serif;
    }
    .card {
      width: min(92vw, 380px); background: var(--panel);
      border: 1px solid var(--line); border-top: 3px solid var(--red);
      padding: 2rem 1.8rem;
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%);
    }
    .mark {
      width: 40px; height: 40px; background: var(--red); display: grid; place-items: center;
      clip-path: polygon(0 0, 100% 0, 100% 70%, 70% 100%, 0 100%);
      font-weight: 800; color: #fff; margin-bottom: 1rem; font-size: 1.2rem;
    }
    h1 { font-size: 1.15rem; letter-spacing: 2px; margin: 0 0 .3rem; text-transform: uppercase; }
    h1 strong { color: var(--red); }
    p { color: var(--dim); font-size: .9rem; margin: 0 0 1.3rem; }
    input {
      width: 100%; background: #0f1620; border: 1px solid var(--line); color: #fff;
      padding: .8rem .9rem; font-size: 1rem; border-radius: 4px; margin-bottom: .8rem;
    }
    input:focus { outline: none; border-color: var(--teal); }
    button {
      width: 100%; background: var(--red); color: #fff; border: none; border-radius: 4px;
      padding: .85rem; font-size: .95rem; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; cursor: pointer;
    }
    button:hover { filter: brightness(1.1); }
    .err { color: var(--red); font-size: .85rem; min-height: 1.2em; margin: .6rem 0 0; }
  </style>
</head>
<body>
  <form class="card" id="f">
    <div class="mark">V</div>
    <h1>VALORANT <strong>ASCEND</strong></h1>
    <p>Enter the passphrase to access your training system.</p>
    <input type="password" id="pass" placeholder="Passphrase" autocomplete="current-password" autofocus>
    <button type="submit">Unlock</button>
    <p class="err" id="err"></p>
  </form>
  <script>
    document.getElementById("f").addEventListener("submit", async function (e) {
      e.preventDefault();
      var err = document.getElementById("err");
      err.textContent = "";
      try {
        var res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ passphrase: document.getElementById("pass").value })
        });
        var j = await res.json();
        if (res.ok && j.ok) location.reload();
        else err.textContent = j.error || "Login failed.";
      } catch (ex) {
        err.textContent = "Network error.";
      }
    });
  </script>
</body>
</html>
